name: Docker Security Scan

on:
  push:
    branches: ["**"]
    paths:
      - 'Dockerfile*'
      - 'docker-compose*.yml'
      - '.dockerignore'
  pull_request:
    branches: [main, develop]

jobs:

  # ── 1. Lint the Dockerfile ──────────────────────────────────────────
  hadolint:
    name: Hadolint Dockerfile Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          config: .hadolint.yaml
          failure-threshold: warning   # error | warning | info | style | ignore
          format: sarif
          output-file: hadolint-results.sarif

      - name: Upload Hadolint results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: hadolint-results.sarif
          category: hadolint

  # ── 2. Build the image ─────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=scan-

      - name: Build image (no push yet)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          load: true   # loads into local Docker daemon for scanning

      - name: Save image to tar
        run: |
          docker save ${{ steps.meta.outputs.tags }} -o image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar
          retention-days: 1

  # ── 3. Trivy — CVE scan on built image ────────────────────────────
  trivy:
    name: Trivy Image Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load image
        run: docker load -i image.tar

      - name: Run Trivy (CRITICAL/HIGH — blocking)
        uses: aquasecurity/trivy-action@master
        with:
          input: image.tar
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'            # ← blocks deploy on findings
          ignore-unfixed: true      # don't fail on CVEs with no patch yet

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()               # upload even if step failed
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Run Trivy (full report — informational)
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          input: image.tar
          format: table
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: '0'           # informational only

  # ── 4. Dockle — CIS Benchmark compliance ──────────────────────────
  dockle:
    name: Dockle CIS Benchmark
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load image
        run: docker load -i image.tar

      - name: Run Dockle
        run: |
          VERSION=$(curl -s https://api.github.com/repos/goodwithtech/dockle/releases/latest \
            | grep '"tag_name"' | sed 's/.*"v\([^"]*\)".*/\1/')
          curl -sSfL \
            https://github.com/goodwithtech/dockle/releases/download/v${VERSION}/dockle_${VERSION}_Linux-64bit.tar.gz \
            | tar xz
          ./dockle \
            --exit-code 1 \
            --exit-level fatal \
            $(docker load -q -i image.tar | awk '{print $NF}')

  # ── 5. Deploy gate ─────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [hadolint, trivy, dockle]   # all three must pass
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to Railway
        run: echo "Deploy step here"
